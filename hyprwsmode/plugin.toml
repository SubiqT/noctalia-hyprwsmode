# Bar widget that reflects the current mode of the focused Hyprland workspace
# (tile / stack / float) as reported by the hyprwsmode compositor plugin.
#
# The plugin id follows Noctalia's <author>/<plugin> convention. Per the
# community-plugins layout, the directory name must match the part after the
# slash, so the plugin lives at `hyprwsmode/`.

id           = "subiqt/hyprwsmode"
name         = "Hyprwsmode"
version      = "0.1.0"
# `plugin_api` is what the current Noctalia runtime requires (post commit
# 6b36320, 2026-07-16). `min_noctalia` is what the pre-migration runtime
# requires. Both are declared so the manifest validates against either
# runtime; each ignores the key it does not know.
plugin_api   = 4
min_noctalia = "5.0.0"
author       = "subiqt"
license      = "MIT"
description  = "Bar widget showing the hyprwsmode compositor plugin's per-workspace mode with click-to-toggle."
tags         = ["bar", "hyprland", "indicator"]
# `nc` streams Hyprland's socket2 UNIX socket. OpenBSD-style netcat is
# required for `-U` (Unix-domain) support; NixOS ships this by default via
# libressl, and it is the standard `nc` on Arch, Debian, and Fedora too.
# GNU netcat lacks `-U` and will not work.
#
# hyprctl comes with Hyprland itself so it is not listed here. The hyprwsmode
# compositor plugin is a Hyprland plugin (not a shell command), so it is
# documented in the README instead.
dependencies = ["nc"]

[[widget]]
id    = "wsmode"
entry = "wsmode.luau"

  [[widget.setting]]
  key             = "show_glyph"
  type            = "bool"
  label_key       = "settings.show_glyph.label"
  description_key = "settings.show_glyph.description"
  default         = true

  [[widget.setting]]
  key             = "show_text"
  type            = "bool"
  label_key       = "settings.show_text.label"
  description_key = "settings.show_text.description"
  default         = false

  [[widget.setting]]
  key             = "hide_on_default"
  type            = "bool"
  label_key       = "settings.hide_on_default.label"
  description_key = "settings.hide_on_default.description"
  default         = false

  [[widget.setting]]
  key             = "show_tooltip"
  type            = "bool"
  label_key       = "settings.show_tooltip.label"
  description_key = "settings.show_tooltip.description"
  default         = false
